<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stud‑E</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="top-banner">
  <h1>Stud‑E</h1>
</header>

<div class="app">

  <aside class="sidebar">
    <nav class="nav">
      <button class="nav-btn active" data-tab="dashboard">Dashboard</button>
      <button class="nav-btn" data-tab="workspace">Workspace</button>
      <button class="nav-btn" data-tab="about">About</button>
    </nav>

    <div class="toolbox">
      <button class="tool-btn active" id="selectTool" title="Selection Tool">🔲</button>
      <button class="tool-btn" title="Print">🖨</button>
    </div>
  </aside>

  <main class="main">
    <div class="control-bar">
      <span id="info">Selection inactive</span>
    </div>

    <section class="tab active" id="dashboard">
      <h2>Dashboard</h2>
      <p>Use the Workspace to select and annotate areas.</p>
    </section>

    <section class="tab" id="workspace">
      <h2>Workspace</h2>
      <div class="canvas" id="canvas">
        <div class="card">Sample Content Box</div>
        <div class="card">Another Element</div>
        <div class="card">Selectable Area</div>
      </div>
    </section>

    <section class="tab" id="about">
      <h2>About</h2>
      <p>Stud‑E is a foundation for visual selection and annotation tools.</p>
    </section>
  </main>

<!-- Right Details Pane -->
<aside class="details-pane" id="detailsPane">
  <h3>Selection Details</h3>

  <div class="preview-container">
    <canvas id="previewCanvas"></canvas>
  </div>

  <div class="field">
    <label>Top‑Left (x, y)</label>
    <input id="coordTL" readonly />
  </div>

  <div class="field">
    <label>Top‑Right (x, y)</label>
    <input id="coordTR" readonly />
  </div>

  <div class="field">
    <label>Bottom‑Left (x, y)</label>
    <input id="coordBL" readonly />
  </div>

  <div class="field">
    <label>Bottom‑Right (x, y)</label>
    <input id="coordBR" readonly />
  </div>

  <div class="field">
    <label>Width</label>
    <input id="rectWidth" readonly />
  </div>

  <div class="field">
    <label>Height</label>
    <input id="rectHeight" readonly />
  </div>

  <div class="field">
    <label>Name</label>
    <input id="rectName" placeholder="Enter name" />
  </div>

  <div class="field">
    <label>Comment</label>
    <textarea id="rectComment" placeholder="Add comment"></textarea>
  </div>
</aside>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="script.js"></script>
<script src="script.js"></script>
</body>
</html>
